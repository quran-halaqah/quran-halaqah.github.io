<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غريب القرآن | حلقة القرآن الكريم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

    href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

<body data-page="ghareeb">
  <div id="site-header"></div>

  <main>
    <div class="container">
      <h1>غريب القرآن</h1>

        للوصول إلى سورة أو كلمة بعينها.

      <div class="search-box">
        <input
          type="search"
          id="ghareeb-search"
          placeholder="ابحث عن سورة أو كلمة..."
          autocomplete="off"
        />
      </div>

      <div class="card-grid" id="surah-grid"></div>

      <div id="word-results"></div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="/js/nav.js"></script>
